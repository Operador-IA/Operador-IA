<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola de Monitoreo CCTV - Modo Nocturno</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        header {
            width: 100%;
            max-width: 850px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        h2 { margin: 0; font-size: 1.3rem; color: #38bdf8; letter-spacing: 0.5px; }
        
        .status-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .loading { background-color: #b45309; color: #fef3c7; }
        .ready { background-color: #1e293b; color: #38bdf8; border: 1px solid #334155; }

        /* Estructura del Dashboard */
        .dashboard {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 850px;
            gap: 15px;
        }
        
        @media(min-width: 768px) {
            .dashboard { flex-direction: row; }
        }

        /* Ventana de Video (Cámara de Seguridad) */
        .monitor-video {
            flex: 1.2;
            position: relative;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #334155;
            aspect-ratio: 4/3;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* Caja de Texto / Panel de Registro para el Operador */
        .panel-registro {
            flex: 1;
            background-color: #0b0f19;
            border: 2px solid #334155;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            max-height: 450px;
        }
        .panel-registro h3 { 
            margin-top: 0; 
            font-size: 1rem; 
            color: #94a3b8; 
            border-bottom: 1px solid #1e293b; 
            padding-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        .caja-eventos {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            padding-right: 2px;
        }
        
        /* Formato de la Alerta Interna del Programa */
        .registro-card {
            background-color: #1e293b;
            border-left: 4px solid #f59e0b;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
            animation: entradaCard 0.25s ease-out;
        }
        .registro-card img { 
            width: 75px; 
            height: 75px; 
            object-fit: cover; 
            border-radius: 4px; 
            border: 1px solid #475569; 
            cursor: pointer;
            transition: transform 0.2s;
        }
        .registro-card img:hover {
            transform: scale(1.05);
        }
        .registro-info { 
            display: flex; 
            flex-direction: column; 
            gap: 3px; 
            font-size: 0.85rem;
            color: #cbd5e1;
        }
        .alerta-texto { font-weight: bold; color: #f59e0b; }
        .meta-line { color: #94a3b8; }
        .meta-line span { color: #f8fafc; font-weight: 500; }

        /* Estado del Sistema Inferior */
        .banner-estado {
            width: 100%;
            max-width: 850px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            background-color: #1e293b;
            border: 1px solid #334155;
            margin-top: 10px;
            color: #94a3b8;
        }

        /* Ventana Emergente de Zoom (Modal) */
        .modal-zoom {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            cursor: pointer;
        }
        .modal-zoom img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 8px;
            border: 2px solid #38bdf8;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .modal-close {
            position: absolute;
            top: 20px; right: 20px;
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 8px 14px;
            font-weight: bold;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        @keyframes entradaCard { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h2>👁️ CONSOLA DE MONITOREO - ANALÍTICA EN VIVO</h2>
        <div id="status" class="status-badge loading">INICIALIZANDO...</div>
    </header>

    <div class="dashboard">
        <div class="monitor-video">
            <video id="webcam" autoplay muted playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <div class="panel-registro">
            <h3>LOG DE EVENTOS (SALA DE RESTRICCIÓN)</h3>
            <div id="caja-eventos" class="caja-eventos"></div>
        </div>
    </div>

    <div id="banner-estado" class="banner-estado">
        Cargando archivos del modelo de reconocimiento...
    </div>

    <div id="visor-modal" class="modal-zoom" onclick="cerrarVisor()">
        <button class="modal-close">CERRAR [X]</button>
        <img id="img-grande" src="" alt="Zoom Evidencia">
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const statusBadge = document.getElementById('status');
        const bannerEstado = document.getElementById('banner-estado');
        const cajaEventos = document.getElementById('caja-eventos');
        const visorModal = document.getElementById('visor-modal');
        const imgGrande = document.getElementById('img-grande');
        
        let ctx = canvas.getContext('2d');
        let model = null;
        
        // Memoria de tracking individual de intrusos
        let registrosPersonas = [];
        const TIEMPO_ESPERA_REPETICION = 2 * 60 * 1000; // 2 minutos exactos en milisegundos

        // Conectar cámara trasera del celular obligatoriamente
        async function encenderCamara() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                const fallbackStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = fallbackStream;
            }
            
            return new Promise((resolve) => {
                video.onloadedmetadata = () => resolve(video);
            });
        }

        // Configuración de inicio
        async function inicializar() {
            await encenderCamara();
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            model = await cocoSsd.load();
            
            statusBadge.innerText = "ONLINE";
            statusBadge.className = "status-badge ready";
            bannerEstado.innerText = "Filtro horario activo: Analizando salón cerrado.";
            
            analizarVideo();
        }

        // Bucle continuo de la IA
        async function analizarVideo() {
            if (!model) return;

            const predicciones = await model.detect(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let tiempoActual = Date.now();

            predicciones.forEach(objeto => {
                if (objeto.class === 'person' && objeto.score > 0.60) {
                    const [x, y, ancho, alto] = objeto.bbox;

                    // Dibujar recuadro verde para el operador
                    ctx.strokeStyle = "#22c55e";
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x, y, ancho, alto);

                    // Lógica de Tracking por distancia de píxeles
                    let esMismaPersona = false;
                    const toleranciaPixeles = 80; // Radio de movimiento permitido en pantalla

                    for (let i = 0; i < registrosPersonas.length; i++) {
                        let r = registrosPersonas[i];
                        let distanciaX = Math.abs(r.x - x);
                        let distanciaY = Math.abs(r.y - y);

                        // Si el objeto está cerca de un registro previo, asumimos que es el mismo individuo
                        if (distanciaX < toleranciaPixeles && distanciaY < toleranciaPixeles) {
                            esMismaPersona = true;
                            
                            // Validar si ya transcurrieron los 2 minutos de restricción para esta persona
                            if (tiempoActual - r.ultimoRegistro > TIEMPO_ESPERA_REPETICION) {
                                r.ultimoRegistro = tiempoActual;
                                r.x = x;
                                r.y = y;
                                registrarEventoInterno(objeto);
                            }
                            break;
                        }
                    }

                    // Si aparece alguien en un sector libre, se trata de otro intruso y se reporta al instante
                    if (!esMismaPersona) {
                        registrosPersonas.push({
                            x: x,
                            y: y,
                            ultimoRegistro: tiempoActual
                        });
                        registrarEventoInterno(objeto);
                    }
                }
            });

            // Limpieza periódica de memoria obsoleta
            if (registrosPersonas.length > 20) {
                registrosPersonas = registrosPersonas.filter(r => tiempoActual - r.ultimoRegistro < TIEMPO_ESPERA_REPETICION * 2);
            }

            requestAnimationFrame(analizarVideo);
        }

        // Registro visual del evento acompañado de la metadata requerida
        function registrarEventoInterno(objetoIA) {
            const hora = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const confianza = Math.round(objetoIA.score * 100);
            
            const canvasFoto = document.createElement('canvas');
            canvasFoto.width = video.videoWidth;
            canvasFoto.height = video.videoHeight;
            const ctxFoto = canvasFoto.getContext('2d');
            ctxFoto.drawImage(video, 0, 0, canvasFoto.width, canvasFoto.height);
            const urlImagen = canvasFoto.toDataURL('image/jpeg');

            const tarjeta = document.createElement('div');
            tarjeta.className = 'registro-card';
            tarjeta.innerHTML = `
                <img src="${urlImagen}" alt="Evidencia" onclick="abrirVisor('${urlImagen}')">
                <div class="registro-info">
                    <div class="alerta-texto">⚠️ Posible intruso en salón</div>
                    <div class="meta-line">Cámara: <span>Celular Trasera #1</span></div>
                    <div class="meta-line">Fiabilidad: <span>${confianza}%</span></div>
                    <div class="meta-line">Registro: <span>${hora} hs</span></div>
                </div>
            `;

            cajaEventos.insertBefore(tarjeta, cajaEventos.firstChild);
        }

        // Controladores del visor de Zoom interactivo
        function abrirVisor(url) {
            imgGrande.src = url;
            visorModal.style.display = 'flex';
        }

        function cerrarVisor() {
            visorModal.style.display = 'none';
            imgGrande.src = '';
        }

        window.onload = inicializar;
    </script>
</body>
</html>
